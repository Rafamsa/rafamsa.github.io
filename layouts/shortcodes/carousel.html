<div class="carousel">
    <div class="carousel__viewport">
        <div class="carousel__track">
            {{ .Inner }}
        </div>
    </div>
    <nav class="carousel__nav">
        <button class="carousel__btn" data-action="first" aria-label="Primeiro slide">&#x23EE; Primeiro</button>
        <button class="carousel__btn" data-action="prev" aria-label="Slide anterior">&#x25C0; Anterior</button>
        <span class="carousel__counter"></span>
        <button class="carousel__btn" data-action="next" aria-label="Próximo slide">Próximo &#x25B6;</button>
        <button class="carousel__btn" data-action="last" aria-label="Último slide">Último &#x23ED;</button>
    </nav>
</div>
<script>
    (function () {
        /* --- Lightbox init (shared, guarded) --- */
        if (!window.__galleryLightboxInit) {
            window.__galleryLightboxInit = true;
            var lb = document.createElement('div');
            lb.className = 'gallery-lightbox';
            lb.innerHTML =
                '<button class="gallery-lightbox__close" aria-label="Fechar">&times;</button>' +
                '<img class="gallery-lightbox__img" src="" alt="" />' +
                '<div class="gallery-lightbox__caption"></div>';
            document.body.appendChild(lb);

            var img = lb.querySelector('.gallery-lightbox__img');
            var cap = lb.querySelector('.gallery-lightbox__caption');
            var closeBtn = lb.querySelector('.gallery-lightbox__close');

            window.openLightbox = function (src, caption) {
                img.src = src;
                img.alt = caption || '';
                cap.textContent = caption || '';
                lb.classList.add('gallery-lightbox--open');
                document.body.style.overflow = 'hidden';
                closeBtn.focus();
            };

            function closeLightbox() {
                lb.classList.remove('gallery-lightbox--open');
                document.body.style.overflow = '';
                img.src = '';
            }

            closeBtn.addEventListener('click', closeLightbox);
            lb.addEventListener('click', function (e) {
                if (e.target === lb) closeLightbox();
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && lb.classList.contains('gallery-lightbox--open')) {
                    closeLightbox();
                }
            });
        }

        /* --- Carousel logic --- */
        var carousels = document.querySelectorAll('.carousel');
        var el = carousels[carousels.length - 1];
        if (!el) return;

        var track = el.querySelector('.carousel__track');
        var slides = track.querySelectorAll('.carousel__slide');
        var counter = el.querySelector('.carousel__counter');
        var total = slides.length;
        var current = 0;

        function goTo(index) {
            if (index < 0) index = 0;
            if (index >= total) index = total - 1;
            current = index;
            track.style.transform = 'translateX(-' + (current * 100) + '%)';
            updateButtons();
        }

        function updateButtons() {
            var btns = el.querySelectorAll('.carousel__btn');
            btns.forEach(function (btn) {
                var action = btn.getAttribute('data-action');
                if (action === 'first' || action === 'prev') {
                    btn.disabled = current === 0;
                } else {
                    btn.disabled = current === total - 1;
                }
            });
            counter.textContent = (current + 1) + ' / ' + total;
        }

        el.querySelector('.carousel__nav').addEventListener('click', function (e) {
            var btn = e.target.closest('.carousel__btn');
            if (!btn || btn.disabled) return;
            var action = btn.getAttribute('data-action');
            if (action === 'first') goTo(0);
            else if (action === 'prev') goTo(current - 1);
            else if (action === 'next') goTo(current + 1);
            else if (action === 'last') goTo(total - 1);
        });

        /* Click slide to open lightbox */
        track.addEventListener('click', function (e) {
            var slide = e.target.closest('.carousel__slide');
            if (!slide) return;
            var src = slide.getAttribute('data-full');
            var titleEl = slide.querySelector('.carousel__title');
            window.openLightbox(src, titleEl ? titleEl.textContent : '');
        });

        /* Keyboard navigation when carousel is focused */
        el.setAttribute('tabindex', '0');
        el.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowLeft') { goTo(current - 1); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { goTo(current + 1); e.preventDefault(); }
            else if (e.key === 'Home') { goTo(0); e.preventDefault(); }
            else if (e.key === 'End') { goTo(total - 1); e.preventDefault(); }
        });

        goTo(0);
    })();
</script>
