{{ define "main" }}
<div class="post">
    <h1 class="post-title">{{ .Title }}</h1>

    <div class="post-meta">
        <span class="post-date">{{ .Date.Format "02/01/2006" }}</span>
    </div>

    <div style="margin: 2rem 0; text-align: center;">
        {{ if eq .Params.media_type "VIDEO" }}
        <video src="{{ .Params.image }}" controls controlsList="nodownload" oncontextmenu="return false;"
            style="max-width: 100%; max-height: 70vh; border: 2px solid var(--primary-color, #f5c211);"></video>
        {{ else }}
        <img src="{{ .Params.image }}" alt="{{ .Title }}" oncontextmenu="return false;" draggable="false"
            style="max-width: 100%; max-height: 70vh; border: 2px solid var(--primary-color, #f5c211);">
        {{ end }}
    </div>

    <div class="post-content">
        {{ .Content }}
    </div>

    <div style="margin-top: 4rem; text-align: center;">
        <a href="{{ .Params.link_instagram }}" target="_blank" rel="noopener noreferrer"
            style="border: 1px solid var(--primary-color, #f5c211); padding: 10px 20px; text-decoration: none; color: var(--primary-color, #f5c211); font-family: monospace; font-size: 1.1rem; transition: all 0.3s ease;">
            Ver post original no Instagram ↗
        </a>
    </div>
</div>
{{ end }}
