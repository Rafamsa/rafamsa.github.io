{{ define "main" }}
<div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Content }}
    <div class="content">{{ .Content }}</div>
    {{ end }}
</div>

{{ $paginator := .Paginate .Pages 12 }}

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 2rem;">

    {{ range $paginator.Pages }}
    <div style="border: 1px solid var(--primary-color, #f5c211); padding: 5px; background: #111;">
        <a href="{{ .Params.link_instagram }}" target="_blank" rel="noopener noreferrer">
            <img src="{{ .Params.image }}" loading="lazy" alt="{{ .Title }}"
                style="width: 100%; aspect-ratio: 1 / 1; object-fit: cover; filter: grayscale(20%); transition: filter 0.3s ease;">
        </a>
    </div>
    {{ end }}
</div>

<div style="display: flex; justify-content: space-between; margin-top: 3rem; font-family: monospace;">
    {{ if $paginator.HasPrev }}
    <a href="{{ $paginator.Prev.URL }}" style="color: var(--primary-color, #f5c211); text-decoration: none;">← Mais
        recentes</a>
    {{ else }}
    <span></span>
    {{ end }}

    {{ if $paginator.HasNext }}
    <a href="{{ $paginator.Next.URL }}" style="color: var(--primary-color, #f5c211); text-decoration: none;">Mais
        antigas →</a>
    {{ end }}
</div>

<style>
    div>a>img:hover {
        filter: grayscale(0%);
    }
</style>
{{ end }}
